      .ontology-focus { fill: #fff; stroke: #c40000; stroke-width: 5; }
      .ontology-focus-text { fill: #c40000; font-size: 31px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .governance-bg { fill: #fff9ed; stroke: #dfa12d; stroke-width: 5; }
      .governance-label { fill: #e5a127; }
      .governance-title { fill: #fff; font-size: 24px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .chevron { fill: #fff4d6; stroke: #e4b33c; stroke-width: 4; }
