<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2733 1331" role="img" aria-labelledby="title desc">
  <title id="title">HugAgentOS layered architecture</title>
  <desc id="desc">Platform, agent, capability component, ontology, data governance, data foundation, and security governance layers.</desc>
  <defs>
    <style>
