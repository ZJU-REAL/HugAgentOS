      .section-label { fill: #2559a5; }
      .section-label-text { fill: #fff; font-size: 29px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .group { fill: none; stroke: #8db5dd; stroke-width: 4; stroke-dasharray: 13 10; }
      .group-title { fill: #557aa9; font-size: 30px; font-weight: 700; }
      .box { fill: #fff; stroke: #8bb3dc; stroke-width: 4; }
      .box-text { fill: #171717; font-size: 27px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
