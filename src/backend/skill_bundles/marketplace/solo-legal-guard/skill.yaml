# 使用说明

## 快速开始

### 1. 审查合同
```
请帮我审查这份合同：
[粘贴合同文本或上传文件]
```

### 2. 生成合同模板
```
生成一份服务协议，甲方是"XX科技"，乙方是"我的公司"，
服务内容是"网站开发"，金额是5万元
```

### 3. 合规检查
```
检查我的一人公司合规情况，主营业务是软件开发
```

## 支持的合同类型
- 服务协议
- 外包开发协议
- 保密协议(NDA)
- 顾问协议
- 授权许可协议
- 合作协议

## 数据来源说明
本Skill涉及的所有法律条款均来自：
- 全国人民代表大会官网 (http://www.npc.gov.cn/)
- 国家法律法规数据库
- 最高人民法院司法解释

## 免责声明
本Skill提供的法律建议仅供参考，不构成正式法律意见或律师服务。
重大法律决策请咨询持牌律师。

