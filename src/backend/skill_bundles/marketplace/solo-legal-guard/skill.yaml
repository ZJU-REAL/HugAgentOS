---
# 核心功能实现

# =============================================================================
# 功能一：智能合同审查 (Contract Reviewer)
# =============================================================================

contract_review:
  description: |
    对上传或粘贴的合同文本进行智能审查，识别法律风险点，提供修改建议。
    基于《中华人民共和国民法典》合同编及相关司法解释进行专业分析。
  
  supported_contract_types:
    - 服务协议
    - 外包开发协议
    - 保密协议(NDA)
    - 顾问协议
    - 授权许可协议
    - 合作协议
    - 买卖合同
    - 租赁合同
  
  # 审查维度定义（含法律依据）
  review_dimensions:
    # -------------------------------------------------------------------------
    # 维度1: 主体条款审查
    # -------------------------------------------------------------------------
    - name: 主体条款
      legal_basis:
        law: 《中华人民共和国民法典》
        article: 第四百六十五条
        content: "依法成立的合同，受法律保护。依法成立的合同，仅对当事人具有法律约束力，但是法律另有规定的除外。"
        source: 全国人民代表大会
        url: http://www.npc.gov.cn/
      
      check_items:
        - item: 合同双方名称完整性
          risk_level: 高
          description: 检查甲乙双方名称、统一社会信用代码、法定代表人信息是否完整
          missing_risk: "主体信息不完整可能导致合同效力争议"
          
        - item: 签约资质审查
          risk_level: 高
          description: 检查签约方是否具备签约资质（如特殊行业许可）
          missing_risk: "无资质签约可能导致合同无效"
      
      risk_keywords:
        - "甲方"
        - "乙方"
        - "法定代表人"
        - "统一社会信用代码"
        - "营业执照"
    
    # -------------------------------------------------------------------------
    # 维度2: 付款条款审查
    # -------------------------------------------------------------------------
    - name: 付款条款
      legal_basis:
        law: 《中华人民共和国民法典》
        article: 第五百七十七条
        content: "当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约责任。"
        source: 全国人民代表大会
        url: http://www.npc.gov.cn/
      
      check_items:
        - item: 付款金额明确性
          risk_level: 高
          description: 检查金额是否明确（含税/不含税）、币种、大写小写是否一致
          missing_risk: "金额不明确可能导致价款争议"
          
        - item: 付款条件
          risk_level: 高
          description: 检查付款条件（预付款、进度款、尾款）及比例是否合理
          missing_risk: "付款条件不清可能导致收款困难"
          
        - item: 付款期限
          risk_level: 中
          description: 检查付款期限是否明确（具体日期或条件触发）
          missing_risk: "付款期限不明可能导致拖延付款"
          
        - item: 逾期违约金
          risk_level: 高
          description: 检查是否约定逾期付款违约金（建议日万分之五至千分之一）
          missing_risk: "无违约金约定，逾期难以追责"
          legal_note: |
            根据《民法典》第五百八十五条，约定的违约金过分高于造成的损失的，
            人民法院或者仲裁机构可以根据当事人的请求予以适当减少。
            通常日万分之五（年化18%）至千分之一（年化36%）属于合理范围。
      
      risk_keywords:
        - "付款"
        - "金额"
        - "违约金"
        - "逾期"
        - "滞纳金"
    
    # -------------------------------------------------------------------------
    # 维度3: 交付条款审查
    # -------------------------------------------------------------------------
    - name: 交付条款
      legal_basis:
        law: 《中华人民共和国民法典》
        article: 第五百零九条
        content: "当事人应当按照约定全面履行自己的义务。"
        source: 全国人民代表大会
        url: http://www.npc.gov.cn/
      
      check_items:
        - item: 交付标准
          risk_level: 高
          description: 检查交付成果的标准是否明确、可量化
          missing_risk: "交付标准模糊可能导致验收争议"
          
        - item: 交付时间
          risk_level: 中
          description: 检查交付时间节点是否明确
          missing_risk: "交付时间不明可能导致延期无法追责"
          
        - item: 验收条件
          risk_level: 高
          description: 检查验收流程、验收期限、不合格处理方式
          missing_risk: "验收条件不清可能导致无限期修改"
          
        - item: 延期责任
          risk_level: 中
          description: 检查延期交付的违约责任
          missing_risk: "无延期责任，对方可能无限拖延"
      
      risk_keywords:
        - "交付"
        - "验收"
        - "成果"
        - "标准"
        - "延期"
    
    # -------------------------------------------------------------------------
    # 维度4: 知识产权条款审查
    # -------------------------------------------------------------------------
    - name: 知识产权条款
      legal_basis:
        - law: 《中华人民共和国著作权法》
          article: 第十八条
          content: |
            自然人为完成法人或者非法人组织工作任务所创作的作品是职务作品，
            著作权由作者享有，但法人或者非法人组织有权在其业务范围内优先使用。
            作品完成两年内，未经单位同意，作者不得许可第三人以与单位使用的相同方式使用该作品。
          source: 全国人民代表大会常务委员会
          url: http://www.npc.gov.cn/
        
        - law: 《中华人民共和国著作权法》
          article: 第十一条
          content: "著作权属于作者，本法另有规定的除外。"
          source: 全国人民代表大会常务委员会
          url: http://www.npc.gov.cn/
      
      check_items:
        - item: 成果归属
          risk_level: 高
          description: 明确约定工作成果的知识产权归属（甲方/乙方/共有）
          missing_risk: "未约定归属，按法律规定可能归创作者所有"
          legal_note: |
            根据《著作权法》第十八条，职务作品著作权一般归作者，
            单位仅有优先使用权。如需归单位所有，必须在合同中明确约定。
            
        - item: 授权范围
          risk_level: 中
          description: 如涉及授权，明确授权范围、期限、地域、是否独家
          missing_risk: "授权范围不清可能导致超范围使用侵权"
          
        - item: 第三方权利
          risk_level: 中
          description: 约定是否允许使用第三方素材，侵权责任承担
          missing_risk: "使用侵权素材可能面临索赔"
          
        - item: 源代码/源文件
          risk_level: 高
          description: 软件开发类合同需明确源代码是否交付
          missing_risk: "未约定源代码，可能被技术绑架"
      
      risk_keywords:
        - "知识产权"
        - "著作权"
        - "版权"
        - "源代码"
        - "授权"
        - "归属"
    
    # -------------------------------------------------------------------------
    # 维度5: 违约责任条款审查
    # -------------------------------------------------------------------------
    - name: 违约责任条款
      legal_basis:
        law: 《中华人民共和国民法典》
        article: 第五百七十七条至第五百九十四条
        content: |
          第五百七十七条：当事人一方不履行合同义务或者履行合同义务不符合约定的，
          应当承担继续履行、采取补救措施或者赔偿损失等违约责任。
          
          第五百八十四条：当事人一方不履行合同义务或者履行合同义务不符合约定，
          造成对方损失的，损失赔偿额应当相当于因违约所造成的损失，
          包括合同履行后可以获得的利益；但是，不得超过违约一方订立合同时预见到
          或者应当预见到的因违约可能造成的损失。
        source: 全国人民代表大会
        url: http://www.npc.gov.cn/
      
      check_items:
        - item: 违约金约定
          risk_level: 高
          description: 检查是否约定违约金及计算方式
          missing_risk: "无违约金，违约成本过低"
          
        - item: 损失赔偿
          risk_level: 中
          description: 检查损失赔偿范围约定（直接损失/间接损失）
          missing_risk: "赔偿范围不清，实际损失难以追偿"
          
        - item: 合同解除条件
          risk_level: 高
          description: 检查合同解除条件（根本违约、延期等）
          missing_risk: "解除条件不明，难以止损退出"
          legal_note: |
            根据《民法典》第五百六十三条，有下列情形之一的，当事人可以解除合同：
            （一）因不可抗力致使不能实现合同目的；
            （二）在履行期限届满前，当事人一方明确表示或者以自己的行为表明不履行主要债务；
            （三）当事人一方迟延履行主要债务，经催告后在合理期限内仍未履行；
            （四）当事人一方迟延履行债务或者有其他违约行为致使不能实现合同目的。
          
        - item: 赔偿上限
          risk_level: 中
          description: 检查是否设置赔偿上限（如合同总额的一定比例）
          missing_risk: "无赔偿上限，可能面临巨额索赔"
      
      risk_keywords:
        - "违约"
        - "违约金"
        - "赔偿"
        - "解除合同"
        - "终止"
    
    # -------------------------------------------------------------------------
    # 维度6: 争议解决条款审查
    # -------------------------------------------------------------------------
    - name: 争议解决条款
      legal_basis:
        law: 《中华人民共和国民法典》
        article: 第五百九十三条
        content: |
          当事人一方因第三人的原因造成违约的，应当依法向对方承担违约责任。
          当事人一方和第三人之间的纠纷，依照法律规定或者按照约定处理。
        source: 全国人民代表大会
        url: http://www.npc.gov.cn/
      
      check_items:
        - item: 争议解决方式
          risk_level: 中
          description: 明确约定诉讼或仲裁，不可既诉讼又仲裁
          missing_risk: "约定不明，可能产生管辖争议"
          legal_note: |
            根据《仲裁法》第五条，当事人达成仲裁协议，一方向人民法院起诉的，
            人民法院不予受理，但仲裁协议无效的除外。
            建议：标的额小、需快速解决的选仲裁；需保全、执行便利的选诉讼。
          
        - item: 管辖法院/仲裁机构
          risk_level: 中
          description: 明确约定管辖法院（被告住所地/合同履行地/原告住所地）或仲裁机构
          missing_risk: "管辖不明，可能增加维权成本"
          legal_note: |
            根据《民事诉讼法》第三十五条，合同当事人可以书面协议选择
            被告住所地、合同履行地、合同签订地、原告住所地、标的物所在地等
            与争议有实际联系的地点的人民法院管辖。
          
        - item: 适用法律
          risk_level: 低
          description: 涉外合同需明确适用法律
          missing_risk: "涉外合同未约定适用法律，可能适用外国法"
      
      risk_keywords:
        - "争议解决"
        - "仲裁"
        - "诉讼"
        - "管辖"
        - "法院"
    
    # -------------------------------------------------------------------------
    # 维度7: 保密条款审查
    # -------------------------------------------------------------------------
    - name: 保密条款
      legal_basis:
        law: 《中华人民共和国民法典》
        article: 第五百零一条
        content: |
          当事人在订立合同过程中知悉的商业秘密或者其他应当保密的信息，
          无论合同是否成立，不得泄露或者不正当地使用；
          泄露、不正当地使用该商业秘密或者信息，造成对方损失的，应当承担赔偿责任。
        source: 全国人民代表大会
        url: http://www.npc.gov.cn/
      
      check_items:
        - item: 保密信息范围
          risk_level: 中
          description: 明确约定保密信息的范围（技术信息、经营信息等）
          missing_risk: "范围不清，难以界定违约"
          
        - item: 保密期限
          risk_level: 中
          description: 明确保密期限（合同期内及终止后X年）
          missing_risk: "无期限约定，保密义务不明确"
          
        - item: 保密义务例外
          risk_level: 低
          description: 约定保密义务的例外情形（公开信息、独立开发等）
          missing_risk: "无例外条款，可能承担不合理义务"
          
        - item: 违约责任
          risk_level: 高
          description: 约定泄密违约金或赔偿计算方式
          missing_risk: "无违约责任，保密条款形同虚设"
      
      risk_keywords:
        - "保密"
        - "保密信息"
        - "商业秘密"
        - "泄密"
    
    # -------------------------------------------------------------------------
    # 维度8: 特殊条款审查
    # -------------------------------------------------------------------------
    - name: 特殊条款
      legal_basis:
        law: 《中华人民共和国民法典》
        article: 第四百九十六条
        content: |
          格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商的条款。
          采用格式条款订立合同的，提供格式条款的一方应当遵循公平原则确定当事人之间的权利和义务，
          并采取合理的方式提示对方注意免除或者减轻其责任等与对方有重大利害关系的条款。
        source: 全国人民代表大会
        url: http://www.npc.gov.cn/
      
      check_items:
        - item: 竞业限制
          risk_level: 高
          description: 检查是否有竞业限制条款及补偿约定
          warning: "竞业限制需支付补偿金，否则条款可能无效"
          legal_note: |
            根据《劳动合同法》第二十四条，竞业限制期限不得超过二年，
            且用人单位需按月支付经济补偿。
          
        - item: 自动续约
          risk_level: 高
          description: 检查是否有自动续约条款
          warning: "自动续约可能导致合同无限期延续，难以退出"
          
        - item: 排他性条款
          risk_level: 中
          description: 检查是否有排他性约定（不得与竞争对手合作）
          warning: "排他性条款可能限制业务发展"
          
        - item: 格式条款提示
          risk_level: 中
          description: 如使用格式合同，检查是否对免责条款进行显著提示
          legal_note: |
            根据《民法典》第四百九十六条，提供格式条款的一方未履行提示或者说明义务，
            致使对方没有注意或者理解与其有重大利害关系的条款的，
            对方可以主张该条款不成为合同的内容。
      
      risk_keywords:
        - "竞业"
        - "自动续约"
        - "自动续期"
        - "排他"
        - "独家"

  # 输出报告模板
  output_template: |
    # 合同审查报告
    
    ## 📋 合同基本信息
    - 合同类型：{contract_type}
    - 审查时间：{review_time}
    - 总体风险等级：{overall_risk_level}
    
    ## 🚨 关键风险点（需立即处理）
    {critical_risks}
    
    ## ⚠️ 中等风险点（建议修改）
    {medium_risks}
    
    ## 💡 条款优化建议
    {optimization_suggestions}
    
    ## 📑 缺失建议条款
    {missing_clauses}
    
    ## 📚 法律依据说明
    {legal_basis_summary}
    
    ---
    **免责声明**：本审查报告仅供参考，不构成正式法律意见。重大合同决策请咨询专业律师。

# =============================================================================
# 功能二：合同模板生成 (Template Generator)
# =============================================================================

template_generation:
  description: |
    根据用户输入的参数，生成定制化的合同模板。
    所有模板均基于现行法律法规设计，包含必要的法律条款和风险防控要点。
  
  templates:
    # -------------------------------------------------------------------------
    # 模板1: 服务协议
    # -------------------------------------------------------------------------
    - name: 服务协议
      id: service_agreement
      description: 适用于为客户提供专业服务的场景
      applicable_scenarios:
        - 咨询服务
        - 设计服务
        - 技术服务
        - 营销服务
      
      legal_basis:
        - law: 《中华人民共和国民法典》
          article: 合同编第二分编 典型合同 第二十四章 物业服务合同（参考）
          note: 服务合同属于无名合同，参照适用最相类似合同的规定
        
        - law: 《中华人民共和国民法典》
          article: 第五百七十七条
          content: "当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约责任。"
      
      required_fields:
        - field: 甲方名称
          description: 客户公司名称
          required: true
        
        - field: 乙方名称
          description: 服务提供方名称（你的公司）
          required: true
        
        - field: 服务内容
          description: 具体服务项目描述
          required: true
        
        - field: 服务期限
          description: 服务开始和结束日期
          required: true
        
        - field: 服务费用
          description: 总金额及付款方式
          required: true
        
        - field: 交付标准
          description: 服务成果的验收标准
          required: true
      
      optional_fields:
        - field: 保密要求
          description: 是否需要保密条款
          default: true
        
        - field: 知识产权归属
          description: 成果归属（甲方/乙方）
          default: 甲方
        
        - field: 违约金比例
          description: 逾期付款违约金（日万分之五）
          default: "0.05%"
      
      template_content: |
        服务协议
        
        甲方（委托方）：{甲方名称}
        统一社会信用代码：{甲方信用代码}
        
        乙方（服务方）：{乙方名称}
        统一社会信用代码：{乙方信用代码}
        
        鉴于甲方需要{服务内容}，乙方具备提供该服务的能力和资质，
        双方经友好协商，依据《中华人民共和国民法典》及相关法律法规，
        达成如下协议：
        
        第一条 服务内容
        1.1 乙方为甲方提供以下服务：{服务内容}
        1.2 服务期限：自{开始日期}起至{结束日期}止。
        
        第二条 服务费用及支付
        2.1 本合同总金额为人民币{总金额}元（大写：{大写金额}）。
        2.2 付款方式：
            - 预付款：合同签订后X日内支付{预付款比例}%，即{预付款金额}元；
            - 进度款：{进度款条件}支付{进度款比例}%，即{进度款金额}元；
            - 尾款：验收合格后X日内支付{尾款比例}%，即{尾款金额}元。
        2.3 甲方逾期付款的，每逾期一日，按未付款项的{违约金比例}支付违约金。
        
        第三条 服务成果及验收
        3.1 乙方应在约定期限内完成服务，并向甲方交付以下成果：{交付成果}
        3.2 验收标准：{验收标准}
        3.3 甲方应在收到成果后X个工作日内完成验收，逾期未提出异议的，视为验收合格。
        
        第四条 知识产权
        4.1 乙方在履行本合同过程中产生的所有成果（包括但不限于{成果类型}）的
            知识产权归{知识产权归属}所有。
        4.2 乙方保证交付的成果不侵犯任何第三方的知识产权，否则应承担全部法律责任。
        
        第五条 保密条款
        5.1 双方对本合同内容及履行过程中知悉的对方商业秘密负有保密义务。
        5.2 保密期限：自本合同签订之日起至合同终止后X年。
        5.3 违反保密义务的一方应向对方支付违约金人民币{保密违约金}元。
        
        第六条 违约责任
        6.1 任何一方违反本合同约定的，应承担违约责任，赔偿对方因此遭受的损失。
        6.2 乙方逾期交付成果的，每逾期一日，按合同总金额的{逾期违约金比例}支付违约金。
        6.3 甲方逾期付款超过X日的，乙方有权暂停服务；逾期超过X日的，乙方有权解除合同。
        
        第七条 合同解除
        7.1 经双方协商一致，可以解除本合同。
        7.2 一方严重违约，致使合同目的不能实现的，守约方有权解除合同。
        7.3 合同解除后，双方应就已履行部分进行结算。
        
        第八条 争议解决
        8.1 本合同适用中华人民共和国法律。
        8.2 因本合同引起的争议，双方应友好协商解决；协商不成的，
            任何一方均可向{管辖法院}人民法院提起诉讼。
        
        第九条 其他
        9.1 本合同一式两份，甲乙双方各执一份，具有同等法律效力。
        9.2 本合同自双方签字盖章之日起生效。
        
        （以下无正文）
        
        甲方（盖章）：___________    乙方（盖章）：___________
        法定代表人/授权代表：_____    法定代表人/授权代表：_____
        签订日期：____年__月__日      签订日期：____年__月__日
    
      risk_notes: |
        【使用提示】
        1. 服务内容和交付标准务必具体明确，避免模糊表述
        2. 付款条件建议采用"3331"或"442"分期方式，降低收款风险
        3. 知识产权归属根据业务需要选择，委托开发一般归委托方
        4. 违约金比例建议日万分之五（年化18%），过高可能被法院调减
    
    # -------------------------------------------------------------------------
    # 模板2: 外包开发协议
    # -------------------------------------------------------------------------
    - name: 外包开发协议
      id: outsourcing_agreement
      description: 适用于委托第三方进行软件开发、设计等外包项目
      applicable_scenarios:
        - 软件开发外包
        - UI/UX设计外包
        - 网站开发外包
        - 小程序开发外包
      
      legal_basis:
        - law: 《中华人民共和国民法典》
          article: 第三编 合同
          note: 技术开发合同参照适用
        
        - law: 《中华人民共和国著作权法》
          article: 第十八条
          content: |
            自然人为完成法人或者非法人组织工作任务所创作的作品是职务作品，
            著作权由作者享有，但法人或者非法人组织有权在其业务范围内优先使用。
      
      required_fields:
        - field: 甲方名称
          description: 委托方（你的公司）
          required: true
        
        - field: 乙方名称
          description: 外包方名称
          required: true
        
        - field: 项目名称
          description: 外包项目名称
          required: true
        
        - field: 开发内容
          description: 具体开发需求描述
          required: true
        
        - field: 开发费用
          description: 总金额
          required: true
        
        - field: 开发周期
          description: 预计完成时间
          required: true
        
        - field: 源代码交付
          description: 是否交付源代码
          required: true
      
      special_clauses:
        - clause: 源代码交付
          importance: 极高
          description: 必须明确约定源代码交付时间、方式
          risk: "不交付源代码将被技术绑架，无法维护升级"
        
        - clause: 知识产权归属
          importance: 极高
          description: 明确约定软件著作权归委托方所有
          legal_note: |
            根据《著作权法》第十八条，职务作品著作权归作者，
            必须在合同中明确约定归委托方所有。
        
        - clause: 第三方组件
          importance: 高
          description: 约定使用开源组件的合规性责任
          risk: "使用GPL等传染性开源协议可能导致衍生代码必须开源"
        
        - clause: 测试验收
          importance: 高
          description: 明确测试标准、Bug修复期限
      
      template_content: |
        软件开发外包协议
        
        甲方（委托方）：{甲方名称}
        乙方（开发方）：{乙方名称}
        
        鉴于甲方委托乙方开发{项目名称}，双方依据《中华人民共和国民法典》、
        《中华人民共和国著作权法》及相关法律法规，达成如下协议：
        
        第一条 项目内容
        1.1 项目名称：{项目名称}
        1.2 开发内容：{开发内容}
        1.3 技术需求：详见附件《技术需求文档》
        1.4 交付物清单：
            □ 源代码（{源代码交付}）
            □ 编译后的可执行程序
            □ 技术文档
            □ 操作手册
            □ 测试报告
        
        第二条 开发周期
        2.1 开发周期：自{开始日期}起至{结束日期}止，共计{X}个工作日。
        2.2 里程碑节点：
            - 需求确认：{日期1}
            - 原型设计：{日期2}
            - 开发完成：{日期3}
            - 测试验收：{日期4}
        
        第三条 开发费用
        3.1 合同总金额：人民币{总金额}元（大写：{大写金额}）。
        3.2 付款方式：
            - 首付款：合同签订后X日内支付{比例1}%，即{金额1}元；
            - 里程碑款：完成{里程碑}后支付{比例2}%，即{金额2}元；
            - 验收款：验收合格后X日内支付{比例3}%，即{金额3}元；
            - 质保金：验收合格后X个月支付{比例4}%，即{金额4}元。
        
        第四条 源代码及知识产权
        4.1 乙方应在验收合格后X日内向甲方交付完整的源代码及相关技术文档。
        4.2 本项目的全部知识产权（包括但不限于软件著作权、专利权、商标权）
            归甲方所有。乙方应配合甲方办理软件著作权登记手续。
        4.3 乙方保证交付的软件不侵犯任何第三方的知识产权，否则应承担全部
            法律责任并赔偿甲方损失。
        4.4 乙方使用开源组件的，应事先征得甲方同意，并确保符合开源协议要求。
            因开源协议导致甲方损失的，乙方应承担责任。
        
        第五条 验收标准
        5.1 验收依据：附件《技术需求文档》及《测试用例》。
        5.2 验收流程：
            (1) 乙方完成开发后提交验收申请；
            (2) 甲方在X个工作日内完成测试；
            (3) 发现Bug的，乙方应在X个工作日内修复；
            (4) 验收通过后签署《验收报告》。
        5.3 验收标准：
            - 功能实现率≥{功能实现率}%
            - 严重Bug数=0
            - 一般Bug数≤{一般Bug数}个
        
        第六条 质保与维护
        6.1 质保期：验收合格后{X}个月。
        6.2 质保期内，乙方免费修复因开发质量导致的Bug。
        6.3 质保期外，双方另行协商维护费用。
        
        第七条 保密条款
        7.1 双方对本项目相关的技术资料、商业秘密负有保密义务。
        7.2 保密期限：自本合同签订之日起至项目完成后{X}年。
        7.3 乙方不得将本项目作为案例对外宣传，除非获得甲方书面同意。
        
        第八条 违约责任
        8.1 乙方逾期交付的，每逾期一日，按合同总金额的{违约金比例}支付违约金。
            逾期超过{X}日的，甲方有权解除合同并要求赔偿损失。
        8.2 乙方未按约定交付源代码的，甲方有权拒付尾款并要求乙方继续履行。
        8.3 甲方逾期付款的，每逾期一日，按未付款项的{违约金比例}支付违约金。
        
        第九条 争议解决
        9.1 本合同适用中华人民共和国法律。
        9.2 因本合同引起的争议，双方应协商解决；协商不成的，
            任何一方均可向{管辖法院}人民法院提起诉讼。
        
        第十条 其他
        10.1 本合同附件与正文具有同等法律效力。
        10.2 本合同一式两份，双方各执一份，自签字盖章之日起生效。
        
        附件：
        1. 《技术需求文档》
        2. 《测试用例》
        3. 《验收报告》（模板）
        
        （以下无正文）
        
        甲方（盖章）：___________    乙方（盖章）：___________
        签订日期：____年__月__日      签订日期：____年__月__日
    
      risk_notes: |
        【关键风险提示】
        1. 源代码交付：务必明确约定交付时间、格式、完整性要求
        2. 知识产权：必须在合同中明确约定归委托方所有，否则按《著作权法》
           第十八条可能归开发方所有
        3. 开源组件：要求外包方披露所有使用的开源组件及协议，避免GPL传染
        4. 验收标准：务必量化，避免主观争议
        5. 质保期：建议不少于6-12个月
    
    # -------------------------------------------------------------------------
    # 模板3: 保密协议(NDA)
    # -------------------------------------------------------------------------
    - name: 保密协议
      id: nda_agreement
      description: 适用于商务洽谈、合作前保护商业秘密
      applicable_scenarios:
        - 投资洽谈
        - 商务合作洽谈
        - 供应商评估
        - 客户项目沟通
      
      legal_basis:
        - law: 《中华人民共和国民法典》
          article: 第五百零一条
          content: |
            当事人在订立合同过程中知悉的商业秘密或者其他应当保密的信息，
            无论合同是否成立，不得泄露或者不正当地使用。
        
        - law: 《中华人民共和国反不正当竞争法》
          article: 第九条
          content: |
            经营者不得实施下列侵犯商业秘密的行为：
            （一）以盗窃、贿赂、欺诈、胁迫、电子侵入或者其他不正当手段
            获取权利人的商业秘密；
            （二）披露、使用或者允许他人使用以前项手段获取的权利人的商业秘密；
            （三）违反保密义务或者违反权利人有关保守商业秘密的要求，
            披露、使用或者允许他人使用其所掌握的商业秘密。
      
      required_fields:
        - field: 披露方名称
          description: 披露商业秘密的一方
          required: true
        
        - field: 接收方名称
          description: 接收商业秘密的一方
          required: true
        
        - field: 保密信息范围
          description: 需要保密的具体内容类型
          required: true
        
        - field: 保密期限
          description: 保密义务持续时间
          required: true
          default: "3年"
      
      template_content: |
        保密协议
        
        甲方（披露方）：{披露方名称}
        乙方（接收方）：{接收方名称}
        
        鉴于双方就{合作事项}进行洽谈，甲方将向乙方披露保密信息，
        为保护甲方合法权益，双方依据《中华人民共和国民法典》、
        《中华人民共和国反不正当竞争法》及相关法律法规，达成如下协议：
        
        第一条 保密信息定义
        1.1 "保密信息"指甲方向乙方披露的、标注"保密"或"机密"字样，
            或根据其性质应属保密的所有信息，包括但不限于：
            {保密信息范围}
        1.2 保密信息不包括以下信息：
            (a) 披露时已为公众所知的信息；
            (b) 披露后非因乙方过错成为公众所知的信息；
            (c) 乙方在披露前已合法拥有的信息；
            (d) 乙方从有权披露的第三方处合法获得的信息；
            (e) 乙方独立开发的信息，且未使用甲方的保密信息。
        
        第二条 保密义务
        2.1 乙方承诺对保密信息严格保密，不得向任何第三方披露。
        2.2 乙方仅可将保密信息用于{合作事项}之目的，不得用于其他任何目的。
        2.3 乙方应采取与保护自身保密信息相同的保护措施保护甲方保密信息，
            但不得低于合理的保护标准。
        2.4 乙方仅可向因参与{合作事项}而必须知悉保密信息的雇员披露，
            并确保该等雇员遵守本协议保密义务。
        
        第三条 保密期限
        3.1 本协议保密期限为自本协议签订之日起{X}年。
        3.2 对于甲方的核心商业秘密，保密义务持续至该信息公开为止。
        
        第四条 信息返还
        4.1 经甲方要求或双方终止合作，乙方应立即返还或销毁所有保密信息
            及其复制件，并向甲方出具书面确认函。
        
        第五条 违约责任
        5.1 乙方违反本协议保密义务的，应向甲方支付违约金人民币{违约金金额}元。
        5.2 违约金不足以弥补甲方损失的，乙方应继续赔偿。
        5.3 甲方有权要求乙方停止违约行为并采取补救措施。
        
        第六条 争议解决
        6.1 本协议适用中华人民共和国法律。
        6.2 因本协议引起的争议，双方应协商解决；协商不成的，
            任何一方均可向{管辖法院}人民法院提起诉讼。
        
        第七条 其他
        7.1 本协议自双方签字盖章之日起生效。
        7.2 本协议一式两份，双方各执一份。
        
        （以下无正文）
        
        甲方（盖章）：___________    乙方（盖章）：___________
        签订日期：____年__月__日      签订日期：____年__月__日
    
      risk_notes: |
        【使用提示】
        1. 保密信息范围应具体明确，避免过于宽泛导致难以执行
        2. 保密期限建议2-3年，核心商业秘密可约定"永久保密"
        3. 违约金金额应合理，过高可能被法院调减
        4. 建议双向保密（双方互相承担保密义务），更公平合理

# =============================================================================
# 功能三：合规检查清单 (Compliance Checklist)
# =============================================================================

compliance_check:
  description: |
    针对一人公司(OPC)的特殊法律风险，提供全面的合规检查清单。
    基于《公司法》《个人信息保护法》《数据安全法》等法律法规设计。
  
  # 一人公司特殊风险提示
  opc_specific_risks:
    - risk: 人格混同风险
      description: |
        一人公司股东不能证明公司财产独立于股东自己财产的，
        应当对公司债务承担连带责任。
      legal_basis:
        law: 《中华人民共和国公司法》
        article: 第二十三条第三款
        content: |
          只有一个股东的公司，股东不能证明公司财产独立于股东自己的财产的，
          应当对公司债务承担连带责任。
        source: 全国人民代表大会
        effective_date: 2024-07-01
        note: 2023年修订《公司法》新增条款，强化一人公司债权人保护
      
      prevention_measures:
        - 开设独立的公司银行账户，禁止公私混用
        - 建立规范的财务账簿，保留完整凭证
        - 每年进行财务审计（建议）
        - 股东与公司之间的资金往来需签订借款协议并计息
    
    - risk: 出资期限风险
      description: |
        新《公司法》规定有限责任公司需在成立之日起五年内缴足注册资本。
      legal_basis:
        law: 《中华人民共和国公司法》
        article: 第四十七条
        content: |
          有限责任公司的注册资本为在公司登记机关登记的全体股东认缴的出资额。
          全体股东认缴的出资额由股东按照公司章程的规定自公司成立之日起五年内缴足。
        source: 全国人民代表大会
        effective_date: 2024-07-01
      
      prevention_measures:
        - 合理设定注册资本金额，不要盲目追求高额
        - 制定出资计划，确保在期限内缴足
        - 如无法按期出资，应及时办理减资手续
    
    - risk: 年报公示风险
      description: 未按时报送年度报告将被列入经营异常名录
      legal_basis:
        law: 《企业信息公示暂行条例》
        article: 第八条、第十七条
      
      prevention_measures:
        - 每年1月1日至6月30日报送上一年度报告
        - 确保公示信息真实、准确
  
  # 合规检查清单
  checklist_categories:
    # -------------------------------------------------------------------------
    # 类别1: 公司注册合规
    # -------------------------------------------------------------------------
    - category: 公司注册合规
      description: 公司设立及基本信息维护
      
      items:
        - item: 营业执照
          description: 已取得有效的营业执照
          priority: 必需
          check_method: 查看营业执照正副本
          
        - item: 经营范围
          description: 实际经营业务在登记的经营范围内
          priority: 必需
          legal_basis:
            law: 《中华人民共和国公司法》
            article: 第十一条
            content: "公司的经营范围由公司章程规定，并依法登记。公司可以修改公司章程，改变经营范围，但是应当办理变更登记。"
          risk_note: 超范围经营可能面临行政处罚
          
        - item: 注册地址
          description: 实际经营地址与注册地址一致，或已办理地址变更
          priority: 必需
          legal_basis:
            law: 《中华人民共和国公司法》
            article: 第八条
          risk_note: 地址异常将被列入经营异常名录
          
        - item: 年度报告
          description: 已按时报送并公示年度报告
          priority: 必需
          deadline: 每年1月1日至6月30日
          legal_basis:
            law: 《企业信息公示暂行条例》
            article: 第八条
            content: "企业应当于每年1月1日至6月30日，通过企业信用信息公示系统向工商行政管理部门报送上一年度年度报告，并向社会公示。"
          
        - item: 变更登记
          description: 公司名称、法人、股东等变更已办理登记
          priority: 高
          legal_basis:
            law: 《中华人民共和国公司法》
            article: 第三十二条、第三十四条
    
    # -------------------------------------------------------------------------
    # 类别2: 税务合规
    # -------------------------------------------------------------------------
    - category: 税务合规
      description: 税务登记、申报及发票管理
      
      items:
        - item: 税务登记
          description: 已办理税务登记，领取税务登记证
          priority: 必需
          legal_basis:
            law: 《中华人民共和国税收征收管理法》
            article: 第十五条
          
        - item: 税种核定
          description: 已完成税种核定（增值税、企业所得税等）
          priority: 必需
          
        - item: 纳税申报
          description: 按时进行纳税申报（增值税按月/季，企业所得税按季/年）
          priority: 必需
          deadline: 
            - 增值税：每月15日前（小规模纳税人按季）
            - 企业所得税：季度终了之日起15日内
            - 个人所得税：每月15日前
          legal_basis:
            law: 《中华人民共和国税收征收管理法》
            article: 第二十五条
          risk_note: 逾期申报将产生滞纳金，并影响纳税信用
          
        - item: 发票管理
          description: 按规定领购、开具、保管发票
          priority: 必需
          legal_basis:
            law: 《中华人民共和国发票管理办法》
            article: 全文
          risk_note: 虚开发票属于刑事犯罪
          
        - item: 税收优惠备案
          description: 如享受税收优惠，已按规定备案
          priority: 中
          legal_basis:
            law: 《中华人民共和国税收征收管理法》
            article: 第三十三条
    
    # -------------------------------------------------------------------------
    # 类别3: 劳动用工合规
    # -------------------------------------------------------------------------
    - category: 劳动用工合规
      description: 员工/外包人员管理合规
      
      items:
        - item: 劳动关系认定
          description: 正确区分劳动关系与劳务/外包关系
          priority: 高
          legal_basis:
            law: 《中华人民共和国劳动合同法》
            article: 第七条、第十条
          risk_note: |
            "假外包真派遣"或规避劳动关系的，可能被认定为劳动关系，
            需补缴社保、支付经济补偿等。
          key_distinction:
            - 劳动关系：用人单位直接管理、按月支付工资、需缴纳社保
            - 劳务外包：按成果结算、不直接管理、无需缴纳社保
          
        - item: 劳动合同
          description: 与员工签订书面劳动合同
          priority: 必需
          deadline: 用工之日起一个月内
          legal_basis:
            law: 《中华人民共和国劳动合同法》
            article: 第十条
            content: "建立劳动关系，应当订立书面劳动合同。已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳动合同。"
          risk_note: 未签合同需支付双倍工资（最多11个月）
          
        - item: 社会保险
          description: 为员工缴纳社会保险（五险）
          priority: 必需
          legal_basis:
            law: 《中华人民共和国社会保险法》
            article: 第五十八条、第六十条
          risk_note: 未缴社保将面临补缴+滞纳金+罚款
          
        - item: 工资支付
          description: 按时足额支付工资，不低于最低工资标准
          priority: 必需
          legal_basis:
            law: 《中华人民共和国劳动法》
            article: 第五十条
            content: "工资应当以货币形式按月支付给劳动者本人。不得克扣或者无故拖欠劳动者的工资。"
    
    # -------------------------------------------------------------------------
    # 类别4: 知识产权合规
    # -------------------------------------------------------------------------
    - category: 知识产权合规
      description: 商标、著作权、专利等知识产权保护
      
      items:
        - item: 商标注册
          description: 核心品牌已完成商标注册
          priority: 高
          legal_basis:
            law: 《中华人民共和国商标法》
            article: 第四条
          risk_note: 未注册商标可能被抢注，面临侵权风险
          
        - item: 软件著作权登记
          description: 核心软件已完成著作权登记
          priority: 中
          legal_basis:
            law: 《中华人民共和国著作权法》
            article: 第二条、第三条
          note: 软件著作权自完成之日起自动产生，登记可作为权属证明
          
        - item: 开源合规
          description: 使用开源组件符合许可证要求
          priority: 高
          risk_note: |
            GPL等传染性许可证可能导致衍生代码必须开源。
            建议在代码库中维护开源组件清单及许可证信息。
          
        - item: 字体图片版权
          description: 使用的字体、图片、音乐等已获得授权
          priority: 高
          risk_note: 商业使用免费字体/图片也可能侵权（如微软雅黑）
    
    # -------------------------------------------------------------------------
    # 类别5: 数据合规
      # -------------------------------------------------------------------------
    - category: 数据合规
      description: 个人信息保护与数据安全
      
      items:
        - item: 隐私政策
          description: 已制定并公示隐私政策
          priority: 必需
          applicable_scope: 收集用户个人信息的网站/APP/小程序
          legal_basis:
            law: 《中华人民共和国个人信息保护法》
            article: 第十七条
            content: |
              个人信息处理者在处理个人信息前，应当以显著方式、清晰易懂的语言
              真实、准确、完整地向个人告知下列事项：
              （一）个人信息处理者的名称或者姓名和联系方式；
              （二）个人信息的处理目的、处理方式，处理的个人信息种类、保存期限；
              （三）个人行使本法规定权利的方式和程序；
              （四）法律、行政法规规定应当告知的其他事项。
          source: 全国人民代表大会常务委员会
          effective_date: 2021-11-01
          
        - item: 用户同意
          description: 收集个人信息前已获得用户同意
          priority: 必需
          legal_basis:
            law: 《中华人民共和国个人信息保护法》
            article: 第十三条
            content: |
              符合下列情形之一的，个人信息处理者方可处理个人信息：
              （一）取得个人的同意；
              （二）为订立、履行个人作为一方当事人的合同所必需；
              （三）为履行法定职责或者法定义务所必需；
              ...
          
        - item: 数据安全保护
          description: 采取必要措施保护用户数据安全
          priority: 必需
          legal_basis:
            law: 《中华人民共和国数据安全法》
            article: 第二十七条
            content: |
              开展数据处理活动应当依照法律、法规的规定，
              建立健全全流程数据安全管理制度，组织开展数据安全教育培训，
              采取相应的技术措施和其他必要措施，保障数据安全。
          source: 全国人民代表大会常务委员会
          effective_date: 2021-09-01
          
        - item: 数据跨境传输
          description: 向境外提供数据已履行安全评估或备案程序
          priority: 高
          applicable_scope: 数据出境场景
          legal_basis:
            law: 《数据出境安全评估办法》
            article: 第四条、第五条
          risk_note: 违规出境数据可能面临高额罚款
    
    # -------------------------------------------------------------------------
    # 类别6: 行业资质合规
    # -------------------------------------------------------------------------
    - category: 行业资质合规
      description: 特定行业所需的行政许可
      
      items:
        - item: ICP备案
          description: 网站已完成ICP备案
          priority: 必需
          applicable_scope: 所有网站
          legal_basis:
            law: 《互联网信息服务管理办法》
            article: 第四条、第八条
          note: 通过接入商（阿里云、腾讯云等）提交备案申请
          
        - item: ICP许可证
          description: 已取得ICP经营许可证
          priority: 条件必需
          applicable_scope: 经营性互联网信息服务（收费服务、电商等）
          legal_basis:
            law: 《互联网信息服务管理办法》
            article: 第七条
            content: |
              从事经营性互联网信息服务，应当向省、自治区、直辖市电信管理机构
              或者国务院信息产业主管部门申请办理互联网信息服务增值电信业务经营许可证。
          requirements:
            - 注册资本≥100万元
            - 纯内资企业（外资≤49%需特殊审批）
            - 至少3名员工缴纳社保
            - 经营范围含"第二类增值电信业务"
          
        - item: 等保备案
          description: 已完成网络安全等级保护备案
          priority: 条件必需
          applicable_scope: 涉及用户数据、交易等的系统（建议二级或以上）
          legal_basis:
            law: 《网络安全等级保护条例》
          
        - item: 软件企业认定
          description: 已办理软件企业认定（如适用）
          priority: 低
          applicable_scope: 软件企业
          benefit: 可享受税收优惠

  # 输出报告模板
