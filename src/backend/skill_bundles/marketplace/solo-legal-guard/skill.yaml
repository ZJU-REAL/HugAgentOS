    ## ✅ 已合规项目
    {compliant_items}
    
    ## 📊 合规评分
    - 总体评分：{score}/100
    - 合规等级：{grade}
    
    ## 📚 法律依据汇总
    {legal_basis_summary}
    
    ## 💡 改进建议
    {improvement_suggestions}
    
    ---
