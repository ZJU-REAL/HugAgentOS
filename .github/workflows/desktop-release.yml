# PAUSED: public CE releases stay disabled until the repository-history exposure
# review is closed and a maintainer deliberately removes this workflow guard.
# Build and publish the HugAgentOS Tauri desktop client from the public CE tree.
#
# This workflow belongs to the CE overlay because the main repository excludes
# `.github/**` during derivation. Windows and macOS stage the already-derived
# tracked CE checkout as their local-server payload.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#
# To cut a release:
#   1. Run `npm --prefix desktop run version:desktop -- X.Y.Z` and commit the
#      synchronized version files.
#   2. Push `desktop-vX.Y.Z`, or manually dispatch this workflow from that commit;
#      manual runs derive the release tag from the committed desktop version.
#   3. Review the draft release after every platform succeeds, then publish it.

name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    if: ${{ false }} # Security hold: CE release publication is intentionally paused.
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.desktop_version.outputs.version }}
      release_tag: ${{ steps.desktop_version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test desktop release helpers
        working-directory: desktop
        run: npm run test:scripts

      - name: Validate release tag and desktop versions
        id: desktop_version
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: node desktop/scripts/validate-release-version.mjs "$RELEASE_TAG"

  build:
    needs: validate-release
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include:
          # macOS: one universal (arm64 + x86_64) build -> .dmg + updater archive.
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles app dmg"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Linux: tauri.linux.conf.json overrides targets to AppImage + deb.
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          # Windows: the base configuration builds the NSIS installer.
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            file

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      # The public CE tree intentionally has no frontend lockfile. Avoid
      # generating one so the release checkout remains clean for payload staging.
      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Install desktop toolchain (@tauri-apps/cli)
        working-directory: desktop
        # The derived CE tree stages tracked files for the release payload. Use
        # the lockfile exactly as committed so npm does not dirty the checkout.
        run: npm ci --no-audit --no-fund

      - name: Verify dependency installation kept the checkout clean
        run: git diff --exit-code -- desktop/package-lock.json

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HUGAGENT_RELEASE_BUILD: "1"
          # tsc + Vite peaks near Node's default heap limit on hosted runners.
          NODE_OPTIONS: "--max-old-space-size=4096"
        with:
          projectPath: desktop
          tagName: ${{ needs.validate-release.outputs.release_tag }}
          releaseName: "HugAgentOS Desktop __VERSION__"
          releaseBody: "Download the installer for your platform below. See the docs for setup."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
