# Validate desktop changes before they reach the release-only workflow.
name: Desktop CI

on:
  pull_request:
    paths:
      - "desktop/**"
      - "src/frontend/**"
      - ".github/workflows/desktop-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scripts:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop toolchain
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Test release and CE payload helpers
        working-directory: desktop
        run: npm run test:scripts

  platform-tests:
    name: ${{ matrix.name }}
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Rust tests
            os: macos-latest
            prepare_payload: true
          - name: Windows CE payload and Rust tests
            os: windows-latest
            prepare_payload: true

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Install desktop toolchain
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Stage the public CE local-server payload
        if: ${{ matrix.prepare_payload }}
        working-directory: desktop
        run: node scripts/prepare-bundle.mjs

      - name: Install pinned uv for local-server dependency validation
        if: ${{ matrix.prepare_payload }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.30"
          enable-cache: false

      - name: Resolve Windows local-server dependencies
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        shell: pwsh
        run: |
          uv pip install `
            --dry-run `
            --target "$env:RUNNER_TEMP\hugagent-deps-windows" `
            --python-version 3.11 `
            --python-platform x86_64-pc-windows-msvc `
            --requirements generated/server-ce/requirements.txt `
            --requirements generated/server-ce/requirements-mem0.txt `
            --requirements generated/server-ce/docker/requirements-script-runner.txt `
            "protobuf<7" `
            "pymilvus==2.5.18" `
            "milvus-lite==3.1.0"

      - name: Validate macOS bootstrap on the native shell
        if: matrix.os == 'macos-latest'
        working-directory: desktop
        run: npm run test:scripts

      - name: Resolve macOS 12 compatible local-server dependencies
        if: matrix.os == 'macos-latest'
        working-directory: desktop
        run: |
          uv --system-certs pip install \
            --dry-run \
            --target "$RUNNER_TEMP/hugagent-deps-arm64" \
            --python-version 3.11 \
            --python-platform aarch64-apple-darwin \
            --requirements generated/server-ce/requirements.txt \
            --requirements generated/server-ce/requirements-mem0.txt \
            --requirements generated/server-ce/docker/requirements-script-runner.txt \
            --overrides resources/server-bootstrap/requirements-macos-overrides.txt \
            --only-binary pikepdf \
            "protobuf<7" \
            "pymilvus==2.5.18" \
            "milvus-lite==3.1.0"
          uv --system-certs pip install \
            --dry-run \
            --target "$RUNNER_TEMP/hugagent-deps-x86_64" \
            --python-version 3.11 \
            --python-platform x86_64-apple-darwin \
            --requirements generated/server-ce/requirements.txt \
            --requirements generated/server-ce/requirements-mem0.txt \
            --requirements generated/server-ce/docker/requirements-script-runner.txt \
            --overrides resources/server-bootstrap/requirements-macos-overrides.txt \
            --only-binary pikepdf \
            "protobuf<7" \
            "pymilvus==2.5.18" \
            "milvus-lite==3.1.0"

      - name: Run desktop Rust tests
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml
