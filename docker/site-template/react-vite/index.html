<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 建站时必须把 title 改成真实站点名（发布前检查，别留"站点建设中"） -->
    <title>站点建设中</title>
    <style>
      /* 内联加载骨架屏：JS 尚未就绪时也有像样首屏；React 挂载后整体替换 */
      #boot-skeleton {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 24px 10vw;
        background: #f7f8fa;
        font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #boot-skeleton .sk {
        border-radius: 8px;
        background: linear-gradient(90deg, #ececf1 25%, #f5f5f8 50%, #ececf1 75%);
        background-size: 200% 100%;
        animation: sk-shimmer 1.4s ease infinite;
      }
      #boot-skeleton .sk-nav { height: 48px; }
      #boot-skeleton .sk-hero { height: 220px; }
      #boot-skeleton .sk-row { display: flex; gap: 16px; }
      #boot-skeleton .sk-card { flex: 1; height: 140px; }
      #boot-skeleton .sk-line { height: 18px; width: 60%; }
      @keyframes sk-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-skeleton">
        <div class="sk sk-nav"></div>
        <div class="sk sk-hero"></div>
        <div class="sk-row">
          <div class="sk sk-card"></div>
          <div class="sk sk-card"></div>
          <div class="sk sk-card"></div>
        </div>
        <div class="sk sk-line"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
